<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <span class="brand">🎓 Campus Event Management</span>
    <a th:href="@{/}">← Home</a>
</nav>

<div class="container-sm">
    <div class="card">
        <h2 style="text-align:center;">🎓 Student Login</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form method="post" th:action="@{/student/login}">
            <div class="form-group">
                <label>Registration Number</label>
                <input type="text" name="regNo" class="form-control" placeholder="e.g. 22CS001" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
            </div>
            <button type="submit" class="btn btn-warning" style="width:100%; margin-top:8px;">Login</button>
        </form>

        <p style="text-align:center; margin-top:18px; font-size:0.9rem; color:var(--muted);">
            New student?
            <a th:href="@{/student/signup}" style="color:var(--primary); font-weight:700;">Sign up here</a>
        </p>
    </div>
</div>

</body>
</html>
