<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Sign Up</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <span class="brand">🎓 Campus Event Management</span>
    <a th:href="@{/}">← Home</a>
</nav>

<div class="container-sm" style="max-width:540px;">
    <div class="card">
        <h2 style="text-align:center;">✏️ Student Sign Up</h2>
        <p style="text-align:center; color:var(--muted); font-size:0.9rem; margin-top:-8px; margin-bottom:20px;">Create your account to register for events</p>

        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form method="post" th:action="@{/student/signup}">
            <div class="form-group">
                <label>Registration Number *</label>
                <input type="text" name="regNo" class="form-control" placeholder="e.g. 22CS001" required/>
            </div>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Arun Kumar" required/>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:1;">
                    <label>Department *</label>
                    <input type="text" name="dept" class="form-control" placeholder="e.g. CSE" required/>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Phone Number *</label>
                    <input type="text" name="phone" class="form-control" placeholder="10-digit number" pattern="\d{10}" title="Must be 10 digits" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Create a password" required/>
            </div>
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required/>
                <small id="pwMsg" class="field-hint"></small>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;" id="signupBtn">Create Account</button>
        </form>

        <p style="text-align:center; margin-top:18px; font-size:0.9rem; color:var(--muted);">
            Already have an account?
            <a th:href="@{/student/login}" style="color:var(--primary); font-weight:700;">Login here</a>
        </p>
    </div>
</div>

<script>
const pw = document.getElementById('password');
const cpw = document.getElementById('confirmPassword');
const msg = document.getElementById('pwMsg');
const btn = document.getElementById('signupBtn');

function checkPasswords() {
    if (cpw.value.length === 0) { msg.textContent = ''; return; }
    if (pw.value === cpw.value) {
        msg.textContent = '✓ Passwords match.';
        msg.className = 'field-hint hint-ok';
        btn.disabled = false;
    } else {
        msg.textContent = '⚠ Passwords do not match.';
        msg.className = 'field-hint hint-error';
        btn.disabled = true;
    }
}
pw.addEventListener('input', checkPasswords);
cpw.addEventListener('input', checkPasswords);
</script>

</body>
</html>
