<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <span class="brand">🎓 Campus Event Management</span>
    <a th:href="@{/admin/dashboard}">← Dashboard</a>
</nav>

<div class="container-sm">
    <div class="card">
        <h2>👩‍🎓 Add New Student</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form method="post" th:action="@{/admin/students/add}">
            <div class="form-group">
                <label>Registration Number</label>
                <input type="text" name="regNo" class="form-control" placeholder="e.g. 22CS001" required/>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter student name" required/>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select name="dept" class="form-control" required>
                    <option value="">-- Select Department --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Electrical">Electrical</option>
                </select>
            </div>
            <div class="form-group">
                <label>Phone Number (10 digits)</label>
                <input type="text" name="phone" class="form-control" placeholder="e.g. 9876543210"
                       pattern="\d{10}" title="Must be exactly 10 digits" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Set login password" required/>
            </div>
            <div style="display:flex; gap:12px; margin-top:8px;">
                <button type="submit" class="btn btn-success" style="flex:1;">Add Student</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary" style="flex:1; text-align:center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
