<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Certificate</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        @media print {
            .navbar, .no-print { display: none !important; }
            body { background: white; }
        }
    </style>
</head>
<body>

<nav class="navbar no-print">
    <span class="brand">🎓 Campus Event Management</span>
    <a th:href="@{/student/dashboard}">← Dashboard</a>
</nav>

<div class="container">
    <div class="certificate">
        <div style="font-size:2.5rem; margin-bottom:10px;">🏆</div>
        <h1>Certificate of Participation</h1>
        <div style="height:2px; background: linear-gradient(90deg, #1a237e, #f9a825, #1a237e); margin: 16px 0;"></div>

        <div class="cert-body">
            <p>This is to certify that</p>
            <p class="student-name" th:text="${studentName}">Student Name</p>
            <p>has successfully participated in</p>
            <p class="event-name" th:text="${eventName}">Event Name</p>
            <p>organized by <strong>Campus Event Management System</strong></p>
        </div>

        <div style="height:2px; background: linear-gradient(90deg, #1a237e, #f9a825, #1a237e); margin: 16px 0;"></div>
        <p style="font-size:0.85rem; color:#90a4ae; margin-top:10px;">Issued by Campus Administration</p>
    </div>

    <div class="no-print" style="text-align:center; margin-top:20px;">
        <button onclick="window.print()" class="btn btn-primary">🖨️ Print Certificate</button>
        <a th:href="@{/student/dashboard}" class="btn btn-secondary" style="margin-left:12px;">← Back</a>
    </div>
</div>

</body>
</html>
